<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Warriors III Odds Calculator</title>
    <style>
        body {
            background-color: #0f1420;
            background-image: linear-gradient(135deg, #0f1420 25%, #1a2233 100%);
            font-family: 'Arial Black', 'Impact', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .ui-container {
            width: 100%;
            max-width: 550px;
            background: #23272a;
            border: 4px solid #000000;
            box-shadow: 0 15px 0px rgba(0,0,0,0.5);
            position: relative;
            user-select: none;
        }

        .ui-header {
            background: linear-gradient(90deg, #1e70ff 0%, #00d2ff 100%);
            padding: 12px 25px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #000;
            border-bottom: 4px solid #000000;
            clip-path: polygon(0% 0%, 100% 0%, 96% 100%, 0% 100%);
            margin-right: 15px;
        }

        .close-btn {
            background: linear-gradient(135deg, #ff3b3b 0%, #9e0000 100%);
            border: 3px solid #000;
            width: 32px;
            height: 32px;
            transform: rotate(45deg);
            position: absolute;
            right: 12px;
            top: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 0 #000;
        }
        .close-btn::before {
            content: 'X';
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            color: white;
            font-size: 16px;
            transform: rotate(-45deg);
            text-shadow: 1px 1px 0 #000;
        }

        .ui-body {
            padding: 20px;
            background: #1c1f22;
        }

        .form-group {
            margin-bottom: 15px;
        }
        
        .input-split-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .input-split-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        
        label {
            display: block;
            text-transform: uppercase;
            font-size: 10px;
            color: #8da1b5;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 0px #000;
        }

        select, input[type="number"] {
            width: 100%;
            background: #2c2f33;
            border: 3px solid #000;
            padding: 10px 4px;
            color: #fff;
            font-family: 'Arial Black', sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            border-radius: 4px;
            text-align: center;
        }
        select {
            text-align-last: center;
            padding: 10px;
        }

        .warrior-preview-card {
            background: #121416;
            border: 3px solid #000;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .avatar-box {
            width: 54px;
            height: 54px;
            background: linear-gradient(135deg, #a335ee 0%, #4a157d 100%);
            border: 3px solid #ffcc00;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
        }
        .target-details h3 {
            margin: 0;
            font-size: 18px;
            color: #ffcc00;
            text-transform: uppercase;
            text-shadow: 1px 1px 0 #000;
        }
        .target-details p {
            margin: 2px 0 0 0;
            font-size: 11px;
            color: #a0a0a0;
        }

        .calc-btn {
            width: 100%;
            background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%);
            border: 4px solid #000;
            padding: 12px;
            color: #000;
            font-family: 'Arial Black', sans-serif;
            font-size: 20px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 5px 0 #000;
            margin-bottom: 20px;
        }
        .calc-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #000;
        }

        .results-container {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .results-panel {
            flex: 1;
            background: #121416;
            border: 4px solid #000;
            padding: 15px 10px;
            text-align: center;
        }
        .results-panel.shiny-panel {
            border-color: #ffcc00;
        }
        .results-title {
            font-size: 11px;
            color: #00d2ff;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .odds-display {
            font-size: 20px;
            color: #fff;
            text-shadow: 2px 2px 0px #000;
        }

        .cooked-meter-box {
            background: #1a1c1e;
            border: 3px solid #000;
            padding: 15px;
            text-align: center;
            border-radius: 6px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }
        .cooked-title {
            font-size: 12px;
            color: #a0a0a0;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .cooked-status {
            font-size: 24px;
            text-transform: uppercase;
            text-shadow: 2px 2px 0px #000;
            margin-bottom: 8px;
        }
        .cooked-quote {
            font-family: 'Arial', sans-serif;
            font-size: 13px;
            color: #d1d5db;
            font-style: italic;
            border-top: 1px dashed #3f444e;
            padding-top: 8px;
            margin-top: 5px;
        }

        .watermark {
            font-family: 'Arial', sans-serif;
            font-size: 11px;
            color: #63707e;
            text-align: left;
        }
        .watermark a {
            color: #ffcc00;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="ui-container">
        <div class="ui-header">
            <span>Warriors Master Calc</span>
        </div>
        <div class="close-btn"></div>

        <div class="ui-body">
            <div class="form-group">
                <label for="warriorSelect">Select Target Warrior</label>
                <select id="warriorSelect" onchange="updateCardPreview()">
                    <option value="broly">Broly (Secret)</option>
                    <option value="vegita">Vegita (Secret)</option>
                    <option value="minato">Minato Namikaze (Secret)</option>
                    <option value="mihawk">Mihawk (Secret)</option>
                    <option value="naruto" selected>Naruto Beast (Secret)</option>
                </select>
            </div>

            <div class="warrior-preview-card">
                <div class="avatar-box" id="cardIcon">🦊</div>
                <div class="target-details">
                    <h3 id="cardName">Naruto Beast</h3>
                    <p id="cardBaseOdds">Base Odds: 1 in 2,028,912</p>
                </div>
            </div>

            <div class="input-split-row">
                <div class="form-group">
                    <label for="totalLuckInput">Luck Multiplier</label>
                    <input type="number" id="totalLuckInput" value="16.652" step="0.001" min="0">
                </div>
                <div class="form-group">
                    <label for="secretChanceInput">Secret % Stat</label>
                    <input type="number" id="secretChanceInput" value="150" step="1" min="0">
                </div>
                <div class="form-group">
                    <label for="shinyChanceInput">Shiny Roll %</label>
                    <input type="number" id="shinyChanceInput" value="5.0" step="0.1" min="0.01">
                </div>
            </div>

            <div class="form-group">
                <label for="starsToOpenInput">Amount of Stars to Open</label>
                <input type="number" id="starsToOpenInput" value="50000" step="1000" min="1">
            </div>

            <button class="calc-btn" onclick="calculateFinalOdds()">Calculate Odds</button>

            <div class="results-container">
                <div class="results-panel">
                    <div class="results-title">Standard Variant</div>
                    <div class="odds-display" id="oddsOutput">1 in --</div>
                </div>
                <div class="results-panel shiny-panel">
                    <div class="results-title">✨ Shiny Variant ✨</div>
                    <div class="odds-display" id="shinyOddsOutput">1 in --</div>
                </div>
            </div>

            <div class="cooked-meter-box" id="cookedMeter">
                <div class="cooked-title">Gacha Status Evaluation</div>
                <div class="cooked-status" id="cookedStatus">Awaiting Data...</div>
                <div class="cooked-quote" id="cookedQuote">"Enter your grinding stats to see if you're cooked."</div>
            </div>

            <div class="watermark">
                Made by: <a href="https://www.roblox.com/users/10629544302/profile" target="_blank">GoatedWisp</a>
            </div>
        </div>
    </div>

    <script>
        const secretDatabase = {
            broly: { name: "Broly", denominator: 975762, icon: "☄️" },
            vegita: { name: "Vegita", denominator: 1144165, icon: "👑" },
            minato: { name: "Minato Namikaze", denominator: 1431762, icon: "⚡" },
            mihawk: { name: "Mihawk", denominator: 1712915, icon: "⚔️" },
            naruto: { name: "Naruto (Beast)", denominator: 2028912, icon: "🦊" }
        };

        function updateCardPreview() {
            const selectedKey = document.getElementById("warriorSelect").value;
            const item = secretDatabase[selectedKey];
            document.getElementById("cardName").innerText = item.name;
            document.getElementById("cardIcon").innerText = item.icon;
            document.getElementById("cardBaseOdds").innerText = `Base Odds: 1 in ${item.denominator.toLocaleString()}`;
        }

        function calculateFinalOdds() {
            const selectedKey = document.getElementById("warriorSelect").value;
            const baseDenominator = secretDatabase[selectedKey].denominator;

            let playerLuck = parseFloat(document.getElementById("totalLuckInput").value) || 0.0;
            let secretBonusPercent = parseFloat(document.getElementById("secretChanceInput").value) || 0.0;
            let shinyPercent = parseFloat(document.getElementById("shinyChanceInput").value) || 5.0;
            let starsToOpen = parseInt(document.getElementById("starsToOpenInput").value) || 0;

            // 1. Get base percent chance
            let basePercentChance = 100 / baseDenominator;

            // 2. Secret Chance multiplier handling (1 + bonus decimal)
            let secretChanceMultiplier = 1 + (secretBonusPercent / 100);

            // 3. Official developer split-path luck logic application
            let luckMultiplier;
            if (playerLuck <= 14) {
                luckMultiplier = 1 + (0.1 * playerLuck);
            } else {
                luckMultiplier = 1.7 + (0.05 * playerLuck);
            }

            // Calculate final probability percent
            let finalPercentChance = basePercentChance * secretChanceMultiplier * luckMultiplier;
            
            // Re-convert percent chance back into a flat denominator rate
            let finalStandardDenominator = Math.round(100 / finalPercentChance);
            if (finalStandardDenominator < 1) finalStandardDenominator = 1;

            const standardDecimalChance = 1 / finalStandardDenominator;
            const finalShinyDenominator = Math.round(finalStandardDenominator / (shinyPercent / 100));

            const probabilityOfFailure = Math.pow(1 - standardDecimalChance, starsToOpen);
            const cumulativeSuccessPercentage = (1 - probabilityOfFailure) * 100;

            document.getElementById("oddsOutput").innerText = `1 in ${finalStandardDenominator.toLocaleString()}`;
            document.getElementById("shinyOddsOutput").innerText = `1 in ${finalShinyDenominator.toLocaleString()}`;

            // Cooked Meter UI Render Section
            const meterBox = document.getElementById("cookedMeter");
            const statusTxt = document.getElementById("cookedStatus");
            const quoteTxt = document.getElementById("cookedQuote");

            if (cumulativeSuccessPercentage <= 12) {
                statusTxt.innerText = "🔥 UTTERLY COOKED 🔥";
                statusTxt.style.color = "#ff3b3b";
                meterBox.style.border = "3px solid #ff3b3b";
                quoteTxt.innerHTML = `GoatedWisp says: Your success chance is only <strong>${cumulativeSuccessPercentage.toFixed(2)}%</strong>. Save your stars, bro, you are walking into a complete trap. 😭`;
            } else if (cumulativeSuccessPercentage <= 35) {
                statusTxt.innerText = "💀 COPPING DELUSION 💀";
                statusTxt.style.color = "#a335ee";
                meterBox.style.border = "3px solid #a335ee";
                quoteTxt.innerHTML = `GoatedWisp says: <strong>${cumulativeSuccessPercentage.toFixed(2)}%</strong> probability. You're praying to the RNG gods on pure cope right now.`;
            } else if (cumulativeSuccessPercentage <= 65) {
                statusTxt.innerText = "⚖️ COIN FLIP ⚖️";
                statusTxt.style.color = "#00d2ff";
                meterBox.style.border = "3px solid #00d2ff";
                quoteTxt.innerHTML = `GoatedWisp says: <strong>${cumulativeSuccessPercentage.toFixed(2)}%</strong> chance. Perfectly balanced. It either drops or it doesn't. Let it rip!`;
            } else if (cumulativeSuccessPercentage <= 88) {
                statusTxt.innerText = "✨ BLESSED SEED ✨";
                statusTxt.style.color = "#ffcc00";
                meterBox.style.border = "3px solid #ffcc00";
                quoteTxt.innerHTML = `GoatedWisp says: <strong>${cumulativeSuccessPercentage.toFixed(2)}%</strong> chance! Your account is officially blessed right now, open them up!`;
            } else {
                statusTxt.innerText = "👑 THE CHOSEN ONE 👑";
                statusTxt.style.color = "#ffffff";
                meterBox.style.border = "3px solid #ffffff";
                quoteTxt.innerHTML = `GoatedWisp says: <strong>${cumulativeSuccessPercentage.toFixed(2)}%</strong> absolute guarantee! The game might as well hand you the character right now.`;
            }
        }

        updateCardPreview();
        calculateFinalOdds();
    </script>
</body>
</html>
