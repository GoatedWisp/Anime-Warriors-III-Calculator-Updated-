<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Warriors III Odds Calculator</title>
    <style>
        body {
            background-color: #0f1420;
            background-image: linear-gradient(135deg, #0f1420 25%, #1a2233 100%);
            font-family: 'Arial Black', 'Impact', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .ui-container {
            width: 100%;
            max-width: 550px;
            background: #23272a;
            border: 4px solid #000000;
            box-shadow: 0 15px 0px rgba(0,0,0,0.5);
            position: relative;
            user-select: none;
        }

        .ui-header {
            background: linear-gradient(90deg, #1e70ff 0%, #00d2ff 100%);
            padding: 12px 25px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #000;
            border-bottom: 4px solid #000000;
            clip-path: polygon(0% 0%, 100% 0%, 96% 100%, 0% 100%);
            margin-right: 15px;
        }

        .close-btn {
            background: linear-gradient(135deg, #ff3b3b 0%, #9e0000 100%);
            border: 3px solid #000;
            width: 32px;
            height: 32px;
            transform: rotate(45deg);
            position: absolute;
            right: 12px;
            top: 10px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 0 #000;
        }
        .close-btn::before {
            content: 'X';
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            color: white;
            font-size: 16px;
            transform: rotate(-45deg);
            text-shadow: 1px 1px 0 #000;
        }

        .view-menu {
            display: flex;
            background: #17191c;
            border-bottom: 4px solid #000;
        }
        .menu-btn {
            flex: 1;
            padding: 12px;
            background: #1c1f22;
            color: #8da1b5;
            font-family: 'Arial Black', sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            text-align: center;
            cursor: pointer;
            border: none;
            border-right: 2px solid #000;
            transition: all 0.2s ease;
        }
        .menu-btn:last-child {
            border-right: none;
        }
        .menu-btn.active {
            background: #2c2f33;
            color: #ffcc00;
            text-shadow: 1px 1px 0 #000;
            box-shadow: inset 0 -4px 0 #ffcc00;
        }

        .ui-body {
            padding: 20px;
            background: #1c1f22;
        }

        .view-panel {
            display: none;
        }
        .view-panel.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }
        
        .input-split-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .input-split-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }
        
        label {
            display: block;
            text-transform: uppercase;
            font-size: 10px;
            color: #8da1b5;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-shadow: 1px 1px 0px #000;
        }

        select, input[type="number"] {
            width: 100%;
            background: #2c2f33;
            border: 3px solid #000;
            padding: 10px 4px;
            color: #fff;
            font-family: 'Arial Black', sans-serif;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            border-radius: 4px;
            text-align: center;
        }
        select {
            text-align-last: center;
            padding: 10px;
        }
        input::placeholder {
            color: #4f5660;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            font-size: 12px;
        }

        .warrior-preview-card {
            background: #121416;
            border: 3px solid #000;
            border-radius: 8px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .avatar-box {
            width: 54px;
            height: 54px;
            background: linear-gradient(135deg, #a335ee 0%, #4a157d 100%);
            border: 3px solid #ffcc00;
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
        }
        .target-details h3 {
            margin: 0;
            font-size: 18px;
            color: #ffcc00;
            text-transform: uppercase;
            text-shadow: 1px 1px 0 #000;
        }
        .target-details p {
            margin: 2px 0 0 0;
            font-size: 11px;
            color: #a0a0a0;
        }

        .calc-btn {
            width: 100%;
            background: linear-gradient(180deg, #ffcc00 0%, #ff9900 100%);
            border: 4px solid #000;
            padding: 12px;
            color: #000;
            font-family: 'Arial Black', sans-serif;
            font-size: 20px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 5px 0 #000;
            margin-bottom: 20px;
        }
        .calc-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #000;
        }

        .results-container {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }
        .results-panel {
            flex: 1;
            background: #121416;
            border: 4px solid #000;
            padding: 15px 10px;
            text-align: center;
        }
        .results-panel.shiny-panel {
            border-color: #ffcc00;
        }
        .results-title {
            font-size: 11px;
            color: #00d2ff;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .odds-display {
            font-size: 20px;
            color: #fff;
            text-shadow: 2px 2px 0px #000;
        }

        .display-box {
            background: #121416;
            border: 3px solid #000;
            padding: 15px;
            text-align: center;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .display-title {
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
            font-size: 11px;
        }
        .display-value {
            font-size: 26px;
            text-shadow: 2px 2px 0px #000;
        }

        .color-pull { color: #00ffcc; }
        .color-time { color: #ff5555; }

        .watermark {
            font-family: 'Arial', sans-serif;
            font-size: 11px;
            color: #63707e;
            text-align: left;
            margin-top: 5px;
        }
        .watermark a {
            color: #ffcc00;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="ui-container">
        <div class="ui-header">
            <span>Warriors Master Calc</span>
        </div>
        <div class="close-btn"></div>

        <div class="view-menu">
            <button class="menu-btn active" onclick="switchView('calcView', this)">Odds Calculator</button>
            <button class="menu-btn" onclick="switchView('timeView', this)">Time Estimator</button>
        </div>

        <div class="ui-body">
            
            <!-- VIEW 1: ODDS CALCULATOR -->
            <div id="calcView" class="view-panel active">
                <div class="form-group">
                    <label for="warriorSelect">Select Target Warrior</label>
                    <select id="warriorSelect" onchange="updateCardPreview()">
                        <option value="broly">Broly (Secret)</option>
                        <option value="vegita">Vegita (Secret)</option>
                        <option value="minato">Minato Namikaze (Secret)</option>
                        <option value="mihawk">Mihawk (Secret)</option>
                        <option value="naruto" selected>Naruto Beast (Secret)</option>
                    </select>
                </div>

                <div class="warrior-preview-card">
                    <div class="avatar-box" id="cardIcon">🦊</div>
                    <div class="target-details">
                        <h3 id="cardName">Naruto Beast</h3>
                        <p id="cardBaseOdds">Base Odds: 1 in 2,028,912</p>
                    </div>
                </div>

                <div class="input-split-row">
                    <div class="form-group">
                        <label for="totalLuckInput">Luck Multiplier</label>
                        <input type="number" id="totalLuckInput" placeholder="e.g. 16.65" step="0.001" min="0">
                    </div>
                    <div class="form-group">
                        <label for="secretChanceInput">Secret % Stat</label>
                        <input type="number" id="secretChanceInput" placeholder="e.g. 150" step="1" min="0">
                    </div>
                    <div class="form-group">
                        <label for="shinyChanceInput">Shiny Roll %</label>
                        <input type="number" id="shinyChanceInput" placeholder="e.g. 5.0" step="0.1" min="0.01">
                    </div>
                </div>

                <div class="form-group">
                    <label for="starsToOpenInput">Amount of Stars to Open</label>
                    <input type="number" id="starsToOpenInput" placeholder="e.g. 1500000" step="50000" min="1">
                </div>

                <button class="calc-btn" onclick="calculateFinalOdds()">Calculate Odds</button>

                <div class="results-container">
                    <div class="results-panel">
                        <div class="results-title">Standard Variant</div>
                        <div class="odds-display" id="oddsOutput">1 in --</div>
                    </div>
                    <div class="results-panel shiny-panel">
                        <div class="results-title">✨ Shiny Variant ✨</div>
                        <div class="odds-display" id="shinyOddsOutput">1 in --</div>
                    </div>
                </div>

                <div class="display-box">
                    <div class="display-title" style="color: #ff9900;">Chance to Pull within Chosen Opens</div>
                    <div class="display-value color-pull" id="pullRateOutput">--%</div>
                </div>
            </div>

            <!-- VIEW 2: ESTIMATED TIME TO HATCH -->
            <div id="timeView" class="view-panel">
                <div class="form-group">
                    <label for="timeStarsInput">Total Stars Planned to Hatch</label>
                    <input type="number" id="timeStarsInput" placeholder="e.g. 3500000" step="50000" min="1">
                </div>

                <div class="input-split-row">
                    <div class="form-group">
                        <label for="batchSizeSelect">Stars Opened per Roll</label>
                        <select id="batchSizeSelect">
                            <option value="3">3 Stars</option>
                            <option value="4">4 Stars</option>
                            <option value="5">5 Stars</option>
                            <option value="6">6 Stars</option>
                            <option value="7">7 Stars</option>
                            <option value="8">8 Stars</option>
                            <option value="9" selected>9 Stars</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="cycleTimeInput">Animation Cycle (Secs)</label>
                        <input type="number" id="cycleTimeInput" placeholder="e.g. 2.5" step="0.05" min="0.01">
                    </div>
                </div>

                <button class="calc-btn" onclick="calculateHatchTime()">Estimate Time</button>

                <div class="display-box">
                    <div class="display-title" style="color: #00d2ff;">Estimated Hatch Duration</div>
                    <div class="display-value color-time" id="timeOutput">--d --h --m --s</div>
                </div>
            </div>

            <div class="watermark">
                Made by: <a href="https://www.roblox.com/users/10629544302/profile" target="_blank">GoatedWisp</a>
            </div>
        </div>
    </div>

    <script>
        const secretDatabase = {
            broly: { name: "Broly", denominator: 975762, icon: "☄️" },
            vegita: { name: "Vegita", denominator: 1144165, icon: "👑" },
            minato: { name: "Minato Namikaze", denominator: 1431762, icon: "⚡" },
            mihawk: { name: "Mihawk", denominator: 1712915, icon: "⚔️" },
            naruto: { name: "Naruto (Beast)", denominator: 2028912, icon: "🦊" }
        };

        function switchView(viewId, buttonEl) {
            document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(viewId).classList.add('active');
            buttonEl.classList.add('active');
        }

        function updateCardPreview() {
            const selectedKey = document.getElementById("warriorSelect").value;
            const item = secretDatabase[selectedKey];
            document.getElementById("cardName").innerText = item.name;
            document.getElementById("cardIcon").innerText = item.icon;
            document.getElementById("cardBaseOdds").innerText = `Base Odds: 1 in ${item.denominator.toLocaleString()}`;
        }

        function calculateFinalOdds() {
            const selectedKey = document.getElementById("warriorSelect").value;
            const baseDenominator = secretDatabase[selectedKey].denominator;

            let playerLuck = parseFloat(document.getElementById("totalLuckInput").value);
            let secretBonusPercent = parseFloat(document.getElementById("secretChanceInput").value);
            let shinyPercent = parseFloat(document.getElementById("shinyChanceInput").value);
            let starsToOpen = parseInt(document.getElementById("starsToOpenInput").value);

            if (isNaN(playerLuck) || isNaN(secretBonusPercent) || isNaN(shinyPercent)) {
                document.getElementById("oddsOutput").innerText = "1 in --";
                document.getElementById("shinyOddsOutput").innerText = "1 in --";
                document.getElementById("pullRateOutput").innerText = "--%";
                return;
            }

            let basePercentChance = 100 / baseDenominator;
            let secretChanceMultiplier = 1 + (secretBonusPercent / 100);

            let luckMultiplier;
            if (playerLuck <= 14) {
                luckMultiplier = 1 + (0.1 * playerLuck);
            } else {
                luckMultiplier = 1.7 + (0.05 * playerLuck);
            }

            let finalPercentChance = basePercentChance * secretChanceMultiplier * luckMultiplier;
            let finalStandardDenominator = Math.round(100 / finalPercentChance);
            if (finalStandardDenominator < 1) finalStandardDenominator = 1;

            const finalShinyDenominator = Math.round(finalStandardDenominator / (shinyPercent / 100));

            document.getElementById("oddsOutput").innerText = `1 in ${finalStandardDenominator.toLocaleString()}`;
            document.getElementById("shinyOddsOutput").innerText = `1 in ${finalShinyDenominator.toLocaleString()}`;

            if (!isNaN(starsToOpen) && starsToOpen > 0) {
                const individualDecimalChance = 1 / finalStandardDenominator;
                const failureProbability = Math.pow(1 - individualDecimalChance, starsToOpen);
                const absolutePullRatePercentage = (1 - failureProbability) * 100;
                document.getElementById("pullRateOutput").innerText = `${absolutePullRatePercentage.toFixed(2)}%`;
            } else {
                document.getElementById("pullRateOutput").innerText = "--%";
            }
        }

        function calculateHatchTime() {
            let totalStars = parseInt(document.getElementById("timeStarsInput").value);
            let batchSize = parseInt(document.getElementById("batchSizeSelect").value);
            let cycleSeconds = parseFloat(document.getElementById("cycleTimeInput").value);

            if (isNaN(totalStars) || isNaN(cycleSeconds) || cycleSeconds <= 0 || totalStars <= 0) {
                document.getElementById("timeOutput").innerText = "--d --h --m --s";
                return;
            }

            // 1. Calculate how many individual batch animation cycles are required
            let totalCycles = Math.ceil(totalStars / batchSize);

            // 2. Map cycles back to real-time clock seconds
            let totalSeconds = Math.ceil(totalCycles * cycleSeconds);

            // 3. Destructure seconds across full day blocks
            let days = Math.floor(totalSeconds / 86400);
            totalSeconds %= 86400;
            let hours = Math.floor(totalSeconds / 3600);
            totalSeconds %= 3600;
            let minutes = Math.floor(totalSeconds / 60);
            let seconds = totalSeconds % 60;

            let formattedTime = "";
            if (days > 0) formattedTime += `${days}d `;
            if (hours > 0 || days > 0) formattedTime += `${hours}h `;
            if (minutes > 0 || hours > 0 || days > 0) formattedTime += `${minutes}m `;
            formattedTime += `${seconds}s`;

            document.getElementById("timeOutput").innerText = formattedTime.trim();
        }

        updateCardPreview();
    </script>
</body>
</html>
